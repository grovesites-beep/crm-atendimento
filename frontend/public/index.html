<!DOCTYPE html>
<html lang="pt" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport"
      content="minimum-scale=1, initial-scale=1, width=device-width" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="color-scheme" content="light" />
    <meta http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <title>AtendeTicket</title>

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      (function () {
        var path = location.pathname || "/";
        var isLogin = /\/(login|signup|forgot-password)(\/|$|\?)/i.test(path) || path === "/";
        try { 
          if (isLogin) {
            localStorage.setItem("theme", "light");
            document.documentElement.classList.remove("dark");
            document.documentElement.setAttribute("data-theme", "light");
            document.addEventListener("DOMContentLoaded", function() {
              document.body.classList.add("login-page");
            });
          } else {
            var theme = localStorage.getItem("theme");
            if (theme === "dark") {
              document.documentElement.classList.add("dark");
              document.documentElement.setAttribute("data-theme", "dark");
            } else {
              document.documentElement.classList.remove("dark");
              document.documentElement.setAttribute("data-theme", "light");
            }
          }
        } catch (e) {
          document.documentElement.classList.remove("dark");
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <style>
      :root {
        --brand: #10aa62;
        --bg-color: #f8f9fa;
        --card-bg: #ffffff;
        --card-stroke: #e5e7eb;
        --text-title: #1f2937;
        --text-body: #4b5563;
      }
      body {
        font-family: 'Inter', sans-serif;
      }
      body.login-page .MuiInputBase-root,
      body.login-page .MuiOutlinedInput-root,
      body.login-page .MuiOutlinedInput-input,
      body.login-page .MuiInputBase-input,
      body.login-page .MuiInputAdornment-root {
        background-color: #ffffff !important;
        color: #000000 !important;
      }
      body.login-page .MuiOutlinedInput-root:hover .MuiOutlinedInput-notchedOutline {
        border-color: #cbd5e1 !important;
      }
      body.login-page .MuiOutlinedInput-root.Mui-focused .MuiOutlinedInput-notchedOutline {
        border-color: #10b981 !important;
      }
    </style>
  </head>

  <body class="h-full antialiased"
    style="background-color: var(--bg-color); color: var(--text-body);">
    <div id="root"></div>
    <noscript class="block px-6 py-4 text-sm">
      Você precisa habilitar o JavaScript para executar este app.
    </noscript>
  </body>
</html>
